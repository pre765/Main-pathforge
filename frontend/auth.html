<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | PathForge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/auth-unified.css">
  <link rel="stylesheet" href="css/select-global.css">
</head>
<body class="auth-page-unified">
  <!-- Subtle animated background -->
  <div class="auth-bg" aria-hidden="true">
    <div class="auth-bg-gradient"></div>
    <div class="auth-bg-particles" id="auth-particles"></div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card glass-card">
      <!-- Tab toggle -->
      <div class="auth-tabs" role="tablist">
        <button type="button" class="auth-tab active" role="tab" id="tab-signin" aria-selected="true">Sign In</button>
        <button type="button" class="auth-tab" role="tab" id="tab-create" aria-selected="false">Create Account</button>
      </div>

      <!-- Sign In Panel -->
      <div class="auth-panel active" id="panel-signin" role="tabpanel">
        <div class="auth-panel-header">
          <h1 class="auth-title">Welcome back</h1>
          <p class="auth-subtitle">Sign in to continue to your dashboard</p>
        </div>
        <form id="form-signin" class="auth-form">
          <div class="input-wrap floating">
            <input type="email" id="signin-email" required autocomplete="email" placeholder=" ">
            <label for="signin-email">Email</label>
          </div>
          <div class="input-wrap floating password-wrap">
            <input type="password" id="signin-password" required autocomplete="current-password" placeholder=" ">
            <label for="signin-password">Password</label>
            <button type="button" class="input-suffix toggle-password" aria-label="Toggle password visibility">
              <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" hidden><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <div class="form-options">
            <a href="forgot-password.html" class="link-muted">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn-primary btn-block">
            <span>Sign In</span>
            <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </form>
        <div class="auth-divider"><span>or continue with</span></div>
        <div class="auth-social">
          <button type="button" class="btn btn-glass btn-social"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Google</button>
          <button type="button" class="btn btn-glass btn-social"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg> GitHub</button>
        </div>
      </div>

      <!-- Create Account Panel -->
      <div class="auth-panel" id="panel-create" role="tabpanel" hidden>
        <div class="auth-panel-header">
          <h1 class="auth-title">Create account</h1>
          <p class="auth-subtitle">Join PathForge and choose your path</p>
        </div>

        <!-- Role selector -->
        <div class="role-selector" role="group" aria-label="Account type">
          <button type="button" class="role-pill active" data-role="student">Student</button>
          <button type="button" class="role-pill" data-role="mentor">Mentor</button>
        </div>
        <input type="hidden" id="create-role" name="role" value="student">

        <form id="form-create" class="auth-form">
          <div class="input-wrap floating">
            <input type="text" id="create-name" required autocomplete="name" placeholder=" ">
            <label for="create-name">Full name</label>
          </div>
          <div class="input-wrap floating">
            <input type="email" id="create-email" required autocomplete="email" placeholder=" ">
            <label for="create-email">Email</label>
          </div>
          <div class="input-wrap floating password-wrap">
            <input type="password" id="create-password" required autocomplete="new-password" minlength="6" placeholder=" ">
            <label for="create-password">Password</label>
            <button type="button" class="input-suffix toggle-password" aria-label="Toggle password visibility">
              <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" hidden><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <div class="password-strength" id="password-strength" aria-live="polite">
            <div class="password-strength-bar"><span class="password-strength-fill" id="password-strength-fill"></span></div>
            <span class="password-strength-label" id="password-strength-label">Password strength</span>
          </div>

          <!-- Bio field for all users -->
          <div class="input-wrap floating">
            <textarea id="create-bio" rows="3" placeholder=" "></textarea>
            <label for="create-bio">Bio (optional)</label>
          </div>

          <!-- Mentor-only fields -->
          <div class="mentor-fields hidden" id="mentor-fields">
            <div class="input-wrap floating">
              <select id="create-domain" aria-label="Domain">
                <option value="">Select domain</option>
                <option value="Web Development">Web Development</option>
                <option value="AIML">AIML</option>
                <option value="Data Science">Data Science</option>
                <option value="Cyber Security">Cyber Security</option>
                <option value="Cloud Computing">Cloud Computing</option>
                <option value="Product & Design">Product & Design</option>
              </select>
              <label for="create-domain">Domain</label>
            </div>
            <div class="input-wrap floating">
              <select id="create-expertise" aria-label="Expertise level">
                <option value="">Expertise level</option>
                <option value="Beginner">Beginner</option>
                <option value="Intermediate">Intermediate</option>
                <option value="Advanced">Advanced</option>
                <option value="Expert">Expert</option>
              </select>
              <label for="create-expertise">Expertise level</label>
            </div>
            <div class="input-wrap floating">
              <input type="number" id="create-years" min="0" max="50" placeholder=" " aria-label="Years of experience">
              <label for="create-years">Years of experience</label>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block">
            <span>Create account</span>
            <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </form>
        <div class="auth-divider"><span>or continue with</span></div>
        <div class="auth-social">
          <button type="button" class="btn btn-glass btn-social"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Google</button>
          <button type="button" class="btn btn-glass btn-social"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg> GitHub</button>
        </div>
      </div>
    </div>
    <p class="auth-footer">
      <a href="path-select.html" class="link-muted">Choose your path without an account →</a>
    </p>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/auth-unified.js"></script>
</body>
</html>
