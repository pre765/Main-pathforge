<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Basics | Roadmap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/roadmap-page.css">
</head>
<body class="roadmap-page">
    <div id="canvas-3d"></div>

    <div id="parallax-bg" aria-hidden="true"></div>

    <div class="roadmap-wrapper">
        <header class="roadmap-header">
            <h1 class="page-title">HTML Basics</h1>
        </header>

        <main class="roadmap-main" role="main">
            <div id="roadmap" class="roadmap-vertical" aria-label="Skill tree roadmap">
                <!-- Nodes will be rendered here by js/roadmap-page.js -->
            </div>
        </main>
    </div>

    <div class="node-modal hidden" id="node-modal" role="dialog" aria-hidden="true" aria-labelledby="modal-title">
        <div class="modal-backdrop" id="modal-backdrop"></div>
        <div class="modal-card" role="document">
            <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
            <h3 id="modal-title">Module</h3>
            <p id="modal-desc" class="muted">Complete the checklist to unlock the next module.</p>

            <div class="modal-body">
                <div class="modal-progress" id="modal-progress" aria-hidden="true">
                    <div class="progress-bar"><div class="progress-fill" id="modal-progress-fill" style="width:0%"></div></div>
                    <div class="progress-text" id="modal-progress-text">0%</div>
                </div>

                <ul class="todo-list" id="modal-todo-list" aria-live="polite"></ul>
            </div>

            <div class="modal-actions">
                <button class="continue-btn" id="continue-btn">CONTINUE</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.min.js"></script>
    <script src="js/three-scene.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/roadmaps-data.js"></script>
    <script src="js/roadmap-page.js"></script>
</body>
</html>
