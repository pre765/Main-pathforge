    <script>
        // Style select elements to match input styling
        document.querySelectorAll('select').forEach(select => {
            select.style.cssText = `
                width: 100%;
                padding: 1rem 0.75rem;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 12px;
                color: var(--text-primary);
                font-size: 1rem;
                font-family: inherit;
                cursor: pointer;
                transition: all 0.3s ease;
            `;
            select.addEventListener('focus', function() {
                this.style.borderColor = 'rgba(0, 255, 136, 0.5)';
                this.style.background = 'rgba(255, 255, 255, 0.08)';
            });
            select.addEventListener('blur', function() {
                this.style.borderColor = 'rgba(255, 255, 255, 0.1)';
                this.style.background = 'rgba(255, 255, 255, 0.05)';
            });
        });

        document.getElementById('guide-signup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('guide-name').value.trim();
            const email = document.getElementById('guide-email').value.trim();
            const password = document.getElementById('guide-password').value;
            const role = document.getElementById('guide-role').value;
            const domain = document.getElementById('guide-domain').value;
            const expertise = document.getElementById('guide-expertise').value;

            if (!name || !email || !password || !role || !domain || !expertise) {
                alert('Please fill in all fields');
                return;
            }

            // Get current user or create new guide account
            const users = getUsers();
            const key = email.toLowerCase().trim();
            
            // Check if email already exists
            if (users[key]) {
                // Update existing user to guide
                users[key].role = role === 'mentor' ? 'guide' : 'student';
                users[key].guideDomain = domain;
                users[key].guideExpertise = expertise;
            } else {
                // Create new guide account
                users[key] = {
                    name: name.trim(),
                    email: key,
                    password: password,
                    role: role === 'mentor' ? 'guide' : 'student',
                    guideDomain: domain,
                    guideExpertise: expertise,
                    joinedAt: new Date().toISOString(),
                    progress: getDefaultProgress(),
                };
            }
            
            saveUsers(users);

            // Set session
            const session = { email: key, name: users[key].name };
            localStorage.setItem('auth_portal_session', JSON.stringify(session));

            alert('Guide registration successful!');
            window.location.href = 'profile.html';
        });
    </script>
</body>
</html>
